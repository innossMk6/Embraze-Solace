<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMBRAZE SOLACE TERMINAL</title>
    <style>
        :root {
            --bg-dark: #0A0516;
            --bg-card: #130C25;
            --bg-input: #1B1135;
            --neon-purple: #A855F7;
            --neon-pink: #EC4899;
            --neon-cyan: #00FFF0;
            --neon-green: #00FFAA;
            --neon-gold: #FFD700;
            --text-main: #F3F4F6;
            --text-grey: #9CA3AF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* LOCK SCREEN OVERLAY */
        #lock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1B0B3A 0%, var(--bg-dark) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #lock-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .lock-box {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .lock-box h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .lock-box p {
            color: var(--text-grey);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .lock-box input {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-input);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            margin-bottom: 1rem;
        }

        .lock-box button {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        .lock-error {
            color: #EF4444;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }

        .lock-error.show {
            display: block;
        }

        /* MAIN APP LAYOUT */
        #app {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(168, 85, 247, 0.2);
            margin-bottom: 1.5rem;
        }

        header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .live-ticker-container {
            background: rgba(19, 12, 37, 0.6);
            border: 1px solid rgba(0, 255, 170, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--neon-green);
        }

        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 0.6rem;
            margin-bottom: 1.5rem;
        }

        .market-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.6rem;
            border-radius: 8px;
            text-align: center;
        }

        .market-card.ready {
            border-color: rgba(168, 85, 247, 0.3);
        }

        .market-card .sym {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--text-grey);
            margin-bottom: 0.25rem;
        }

        .market-card .stat {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            background: #6B7280;
        }

        .dot.green { background: var(--neon-green); }
        .dot.yellow { background: #F59E0B; }

        .workspace {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1.5rem;
        }

        .panel {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            font-size: 0.95rem;
            font-weight: bold;
            color: white;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.5rem;
        }

        .col-left { grid-column: span 4; }
        .col-right { grid-column: span 8; }

        .btn-scan {
            width: 100%;
            padding: 0.8rem;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .btn-scan.ready {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            color: white;
            border: none;
        }

        .engine-block {
            background: var(--bg-input);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 3px solid var(--neon-purple);
        }

        .engine-name {
            font-size: 0.85rem;
            font-weight: bold;
            color: white;
            margin-bottom: 0.6rem;
        }

        .engine-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-action {
            flex: 1;
            padding: 0.6rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-action:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* MATRIX COMPONENT PLACEHOLDERS */
        .matrix-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            margin-bottom: 1.5rem;
            background: var(--bg-input);
            padding: 8px;
            border-radius: 6px;
        }

        .matrix-cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-grey);
        }

        /* SEESAW COMPONENT PLACEHOLDERS */
        .seesaw-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 1.5rem 0;
            position: relative;
        }

        .seesaw-pivot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background: var(--neon-purple);
            border-radius: 50%;
        }

        .signals-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .signal-card {
            background: var(--bg-input);
            border-radius: 8px;
            padding: 1.25rem;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .placeholder-text {
            color: var(--text-grey);
            font-size: 0.85rem;
            text-align: center;
        }

        .signal-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-grey);
            margin-bottom: 0.5rem;
        }

        .signal-body {
            text-align: center;
            margin: auto 0;
        }

        .signal-type {
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--neon-purple);
            margin-bottom: 0.25rem;
        }

        .signal-target {
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            margin-bottom: 0.25rem;
        }

        .signal-conf {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--neon-green);
        }

        .signal-meta {
            font-size: 0.75rem;
            color: var(--text-grey);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

<div id="lock-overlay">
    <div class="lock-box">
        <h1>EMBRAZE SOLACE</h1>
        <p>TERMINAL SYSTEM ENGINE</p>
        <input type="password" id="lockPassword" placeholder="ENTER ACCESS KEY" autocomplete="off">
        <button id="btnUnlock">INITIALIZE TERMINAL</button>
        <div class="lock-error" id="lockError"></div>
    </div>
</div>

<div id="app">
    <header>
        <h1>EMBRAZE SOLACE // MATRIX ENGINE // V13</h1>
        <div class="live-ticker-container" id="liveTicker">Initializing data array stream...</div>
    </header>

    <div class="market-grid" id="marketGrid"></div>

    <div class="workspace">
        <div class="panel col-left">
            <div class="panel-title">CONTROL TERMINAL</div>
            <button class="btn-scan" id="btnScan" disabled>COMPILING MARKET FEED...</button>
            
            <div class="engine-block">
                <div class="engine-name">DIGIT TRANSITION ENGINE</div>
                <div class="engine-actions">
                    <button class="btn-action" id="btnDiffers" disabled>RUN DIFFERS</button>
                    <button class="btn-action" id="btnMatches" disabled>RUN MATCHES</button>
                </div>
            </div>

            <div class="engine-block">
                <div class="engine-name">POLARITY & MASS ENGINES</div>
                <div class="engine-actions">
                    <button class="btn-action" id="btnEvenOdd" disabled>RUN EVEN/ODD</button>
                    <button class="btn-action" id="btnOverUnder" disabled>RUN OVER/UNDER</button>
                </div>
            </div>
        </div>

        <div class="panel col-right">
            <div class="panel-title">LIVE EDGE OUTPUT PLATFORM</div>
            
            <!-- MARKOV VISUAL MATRIX LAYER -->
            <div class="matrix-container" id="visualMatrix">
                <!-- 100 matrix cells generated below -->
            </div>

            <!-- MOMENTUM EXTENSION BAR -->
            <div class="seesaw-bar">
                <div class="seesaw-pivot" id="visualPivot"></div>
            </div>

            <div class="signals-grid">
                <div class="signal-card" id="cardDiffersMatches">
                    <div class="placeholder-text">Execute Digit Engine scan above.</div>
                </div>
                <div class="signal-card" id="cardDirectional">
                    <div class="placeholder-text">Execute Polarity/Mass Engine scan above.</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ---------------------- HARD CODED PARAMETERS ------------------
const APP_PASSWORD = 'SUCCESSV12';
const DERIV_WS = 'wss://ws.derivws.com/websockets/v3?app_id=1089';
const BUFFER_SIZE = 100;

const MARKETS = ['1HZ10V', '1HZ25V', '1HZ50V', '1HZ75V', '1HZ100V', 'JD10', 'JD25', 'JD50', 'JD75', 'JD100'];
const MARKET_LABELS = {
    '1HZ10V': 'V10 (1s)', '1HZ25V': 'V25 (1s)', '1HZ50V': 'V50 (1s)', '1HZ75V': 'V75 (1s)', '1HZ100V': 'V100 (1s)',
    'JD10': 'Jump 10', 'JD25': 'Jump 25', 'JD50': 'Jump 50', 'JD75': 'Jump 75', 'JD100': 'Jump 100'
};

// ---------------------- TERMINAL STORAGE STATE -----------------
let tickBuffers = {};
let ws = null;
let isGatheringComplete = false;

// Initialize clean array structure
MARKETS.forEach(m => tickBuffers[m] = []);

// Populate UI visual grids safely upon bootup sequence
function setupVisualComponents() {
    const matrix = document.getElementById('visualMatrix');
    matrix.innerHTML = '';
    for(let i=0; i<100; i++) {
        const cell = document.createElement('div');
        cell.className = 'matrix-cell';
        cell.id = `cell-${i}`;
        cell.textContent = '0%';
        matrix.appendChild(cell);
    }
}

// ---------------------- V13/V14 ALGORITHMIC LOGIC ------------------

// ENGINE 1 — DIGIT DIFFERS (Rarity Model)
function analyzeDiffer(sequence) {
    const freq = Array(10).fill(0);
    for (let d of sequence) freq[d]++;
    const total = sequence.length;

    let rareDigit = 0;
    let minFreq = Infinity;
    let dominantDigit = 0;
    let maxFreq = 0;

    for (let i = 0; i < 10; i++) {
        if (freq[i] < minFreq) { minFreq = freq[i]; rareDigit = i; }
        if (freq[i] > maxFreq) { maxFreq = freq[i]; dominantDigit = i; }
    }

    const rarity = minFreq / total;
    const dominance = maxFreq / total;

    let confidence = 0;
    if (rarity <= 0.07 && dominance >= 0.18) confidence = 0.95;
    else if (rarity <= 0.10 && dominance >= 0.16) confidence = 0.75;
    else if (rarity <= 0.12) confidence = 0.6;
    else return null; 

    return { type: "DIFFER", digit: rareDigit, confidence, meta: { rarity, dominance } };
}

// ENGINE 2 — DIGIT MATCHES (Dominance + Clustering)
function analyzeMatches(sequence) {
    const freq = Array(10).fill(0);
    for (let d of sequence) freq[d]++;
    const total = sequence.length;

    let dominantDigit = 0;
    let maxFreq = 0;
    for (let i = 0; i < 10; i++) {
        if (freq[i] > maxFreq) { maxFreq = freq[i]; dominantDigit = i; }
    }

    const dominance = maxFreq / total;
    if (dominance < 0.14) return null; 

    let repeats = 0;
    for (let i = 1; i < sequence.length; i++) {
        if (sequence[i] === dominantDigit && sequence[i - 1] === dominantDigit) {
            repeats++;
        }
    }

    const repeatRate = repeats / total;
    if (repeatRate < 0.08) return null; 

    let confidence = 0.7;
    if (dominance > 0.18 && repeatRate > 0.12) confidence = 0.92;
    else if (dominance > 0.16) confidence = 0.82;

    return { type: "MATCH", digit: dominantDigit, confidence, meta: { dominance, repeatRate } };
}

// ENGINE 3 — EVEN / ODD (Streak + Deviation Logic)
function analyzeEvenOdd(sequence) {
    let even = 0; let odd = 0;
    for (let d of sequence) { if (d % 2 === 0) even++; else odd++; }

    const total = sequence.length;
    const evenRatio = even / total;
    const oddRatio = odd / total;

    let streak = 1;
    let lastType = sequence[sequence.length - 1] % 2;
    for (let i = sequence.length - 2; i >= 0; i--) {
        if ((sequence[i] % 2) === lastType) streak++;
        else break;
    }

    const imbalance = Math.abs(evenRatio - 0.5);
    if (imbalance < 0.08 && streak < 3) return null; 

    let signal = null; let confidence = 0;
    if (streak >= 4) {
        signal = lastType === 0 ? "ODD" : "EVEN"; 
        confidence = 0.9;
    } else if (imbalance > 0.12 && streak >= 3) {
        signal = even > odd ? "ODD" : "EVEN";
        confidence = 0.75;
    } else if (imbalance > 0.15) {
        signal = even > odd ? "ODD" : "EVEN";
        confidence = 0.65;
    } else {
        return null;
    }

    return { type: "EVEN_ODD", signal, confidence, meta: { imbalance, streak } };
}

// ENGINE 4 - OVER/UNDER (LOCKED BARRIER LOGIC)
function analyzeOverUnder(sequence) {
    const over = sequence.filter(d => d >= 5).length;
    const under = sequence.length - over;
    const overProb = over / sequence.length;
    const underProb = under / sequence.length;

    if (overProb < 0.55 && underProb < 0.55 && Math.abs(overProb - underProb) < 0.08) return null;
    const dominance = Math.abs(overProb - underProb);
    if (dominance < 0.10) return null;

    if (overProb > underProb) {
        return { type: "OVER/UNDER", signal: "UNDER 9", confidence: 0.85, meta: { edge: overProb } };
    } else {
        return { type: "OVER/UNDER", signal: "OVER 0", confidence: 0.85, meta: { edge: underProb } };
    }
}

// ---------------------- PROCESSING METRICS --------------------
function extractLastDigit(price, symbol) {
    const twoDp = ['1HZ10V','1HZ25V','1HZ50V','1HZ75V','1HZ100V','JD10','JD25','JD50','JD75','JD100'];
    const dec = twoDp.includes(symbol) ? 2 : 3;
    const normalized = Number(price).toFixed(dec);
    return parseInt(normalized.charAt(normalized.length - 1), 10);
}

// Update UI Components safely during streaming arrays
function updateVisualComponents(market) {
    const buffer = tickBuffers[market];
    if (buffer.length < 2) return;

    // Repopulate transition matrix frequencies dynamically
    const transitions = Array.from({ length: 10 }, () => Array(10).fill(0));
    for (let i = 1; i < buffer.length; i++) {
        transitions[buffer[i-1]][buffer[i]]++;
    }

    // Render densities across the fixed 10x10 cell framework
    for (let r = 0; r < 10; r++) {
        const rowTotal = transitions[r].reduce((a, b) => a + b, 0) || 1;
        for (let c = 0; c < 10; c++) {
            const pct = Math.round((transitions[r][c] / rowTotal) * 100);
            const cell = document.getElementById(`cell-${r * 10 + c}`);
            if (cell) {
                cell.textContent = `${pct}%`;
                cell.style.background = `rgba(168, 85, 247, ${pct / 100})`;
                cell.style.color = pct > 40 ? '#000' : 'var(--text-main)';
            }
        }
    }

    // Reposition Seesaw Pivot element horizontally based on structural skew
    const over = buffer.filter(d => d >= 5).length;
    const skewRatio = over / buffer.length; // Range 0.0 to 1.0
    const pivot = document.getElementById('visualPivot');
    if (pivot) {
        pivot.style.left = `${skewRatio * 100}%`;
    }
}

// ---------------------- LIVE CONTROLLERS ----------------------
function runScan(engineType, targetCardId) {
    const container = document.getElementById(targetCardId);
    container.innerHTML = `<div class="placeholder-text">Scanning mathematical surface layers...</div>`;

    let optimalSignal = null;
    let selectedMarket = "";

    for (let market of MARKETS) {
        const buffer = tickBuffers[market];
        if (buffer.length < BUFFER_SIZE) continue;

        let result = null;
        if (engineType === 'DIFFERS') result = analyzeDiffer(buffer);
        if (engineType === 'MATCHES') result = analyzeMatches(buffer);
        if (engineType === 'EVENODD') result = analyzeEvenOdd(buffer);
        if (engineType === 'OVERUNDER') result = analyzeOverUnder(buffer);

        if (result && (!optimalSignal || result.confidence > optimalSignal.confidence)) {
            optimalSignal = result;
            selectedMarket = market;
        }
    }

    if (!optimalSignal) {
        container.innerHTML = `<div class="placeholder-text" style="color:var(--neon-pink);">[NULL] No qualified edge found. Standby.</div>`;
        return;
    }

    // Actively bind structural components upon confirmation
    updateVisualComponents(selectedMarket);

    const displayTarget = optimalSignal.digit !== undefined ? optimalSignal.digit : optimalSignal.signal;
    let metaStr = engineType === 'DIFFERS' ? `Rarity: ${(optimalSignal.meta.rarity*100).toFixed(1)}% | Dom: ${(optimalSignal.meta.dominance*100).toFixed(1)}%` :
                  engineType === 'MATCHES' ? `Dom: ${(optimalSignal.meta.dominance*100).toFixed(1)}% | Cluster: ${(optimalSignal.meta.repeatRate*100).toFixed(1)}%` :
                  engineType === 'EVENODD' ? `Imbal: ${optimalSignal.meta.imbalance.toFixed(2)} | Streak: ${optimalSignal.meta.streak}` :
                  `Mass Distribution Edge: ${(optimalSignal.meta.edge*100).toFixed(1)}%`;

    container.innerHTML = `
        <div class="signal-header"><span>${MARKET_LABELS[selectedMarket]}</span><span>V13 STABLE</span></div>
        <div class="signal-body">
            <div class="signal-type">${optimalSignal.type} CONFIGURATION</div>
            <div class="signal-target" style="color:${engineType.includes('MATCH')?'var(--neon-green)': engineType.includes('DIFFER')?'var(--neon-pink)':'var(--neon-gold)'}">${displayTarget}</div>
            <div class="signal-conf">${(optimalSignal.confidence * 100).toFixed(0)}% CERTIFICATION CONFIDENCE</div>
            <div class="signal-meta">${metaStr}</div>
        </div>
    `;
}

// ---------------------- GATEWAY INTERFACES --------------------
function initWebSocket() {
    ws = new WebSocket(DERIV_WS);
    ws.onopen = () => {
        document.getElementById('liveTicker').textContent = "Connected. Synchronizing tick telemetry array...";
        MARKETS.forEach(m => ws.send(JSON.stringify({ ticks: m, subscribe: 1 })));
    };

    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.msg_type === 'tick') {
            const sym = data.tick.symbol;
            const digit = extractLastDigit(data.tick.quote, sym);
            
            if (!isNaN(digit)) {
                tickBuffers[sym].push(digit);
                if (tickBuffers[sym].length > BUFFER_SIZE) tickBuffers[sym].shift();
                updateCardMetric(sym, tickBuffers[sym].length);
            }
            checkSystemReadiness();
        }
    };
}

// Render dynamic tracking framework on startup
function renderMarketCards() {
    const grid = document.getElementById('marketGrid');
    grid.innerHTML = '';
    MARKETS.forEach(m => {
        grid.innerHTML += `
            <div class="market-card" id="card-${m}">
                <div class="sym">${MARKET_LABELS[m]}</div>
                <div class="stat"><span class="dot" id="dot-${m}"></span> <span id="stat-${m}">0/100</span></div>
            </div>`;
    });
}

function updateCardMetric(sym, len) {
    const el = document.getElementById(`stat-${sym}`);
    const dot = document.getElementById(`dot-${sym}`);
    if (el) el.textContent = `${len}/100`;
    if (dot) dot.className = `dot ${len >= 100 ? 'green' : 'yellow'}`;
}

function checkSystemReadiness() {
    if (isGatheringComplete) return;
    const ready = MARKETS.every(m => tickBuffers[m].length >= BUFFER_SIZE);
    if (ready) {
        isGatheringComplete = true;
        document.getElementById('liveTicker').innerHTML = "🧠 <strong>ALL METRICS COMPILED</strong> — Engines armed.";
        const btnScan = document.getElementById('btnScan');
        btnScan.textContent = "SYSTEM READY TO RUN";
        btnScan.className = "btn-scan ready";
        document.querySelectorAll('.btn-action').forEach(b => b.disabled = false);
    }
}

function unlockApp() {
    if (document.getElementById('lockPassword').value === APP_PASSWORD) {
        document.getElementById('lock-overlay').classList.add('hidden');
        document.getElementById('app').style.display = 'block';
        setupVisualComponents();
        renderMarketCards();
        initWebSocket();
    } else {
        const err = document.getElementById('lockError');
        err.textContent = "INVALID TERMINAL ACCESS TOKEN";
        err.classList.add('show');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('btnUnlock').addEventListener('click', unlockApp);
    document.getElementById('btnDiffers').addEventListener('click', () => runScan('DIFFERS', 'cardDiffersMatches'));
    document.getElementById('btnMatches').addEventListener('click', () => runScan('MATCHES', 'cardDiffersMatches'));
    document.getElementById('btnEvenOdd').addEventListener('click', () => runScan('EVENODD', 'cardDirectional'));
    document.getElementById('btnOverUnder').addEventListener('click', () => runScan('OVERUNDER', 'cardDirectional'));
});
</script>
