<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Burst Engine – Deriv Signals</title>
    <style>
        /* ---------- FULL UI (RESTORED) ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0b0e14;
            color: #e6edf3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .app-container {
            max-width: 780px;
            width: 100%;
        }

        /* --- Login --- */
        #loginScreen {
            background: #161b22;
            border-radius: 24px;
            padding: 40px 30px;
            border: 1px solid #30363d;
            text-align: center;
        }
        #loginScreen h2 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        #loginScreen p {
            color: #8b949e;
            margin-bottom: 24px;
        }
        #loginScreen input {
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 12px 18px;
            border-radius: 40px;
            font-size: 16px;
            color: #e6edf3;
            width: 100%;
            max-width: 280px;
            margin-bottom: 16px;
        }
        #loginScreen button {
            background: #f0883e;
            border: none;
            padding: 12px 40px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            color: #0b0e14;
            cursor: pointer;
        }
        #loginScreen button:hover {
            background: #f09b5a;
        }
        #loginError {
            color: #f85149;
            font-size: 14px;
            margin-top: 12px;
            min-height: 24px;
        }

        /* --- Main App --- */
        #mainApp {
            display: none;
            background: #161b22;
            border-radius: 24px;
            padding: 28px 24px;
            border: 1px solid #30363d;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .header h1 small {
            font-size: 13px;
            font-weight: 400;
            color: #8b949e;
            margin-left: 10px;
        }
        #statusBar {
            font-size: 13px;
            color: #8b949e;
            background: #0d1117;
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid #30363d;
        }
        #statusBar.ready {
            color: #7ae6b0;
            border-color: #1a3d2a;
        }

        /* --- 6 Signal Buttons --- */
        .signal-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 18px 0 20px 0;
        }
        .signal-buttons button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 14px 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .signal-buttons button:hover:not(:disabled) {
            background: #30363d;
            border-color: #f0883e;
            color: #fff;
        }
        .signal-buttons button:disabled {
            opacity: 0.4;
            pointer-events: none;
            cursor: not-allowed;
        }
        .signal-buttons button.primary-btn {
            background: #f0883e;
            border-color: #f0883e;
            color: #0b0e14;
        }
        .signal-buttons button.primary-btn:hover:not(:disabled) {
            background: #f09b5a;
            border-color: #f09b5a;
        }

        /* --- Signal Output Box --- */
        .signal-box {
            background: #0d1117;
            border-radius: 18px;
            padding: 22px 20px;
            border: 1px solid #30363d;
            min-height: 140px;
            transition: border-color 0.3s;
        }
        .signal-box.has-signal {
            border-color: #f0883e;
        }
        .signal-box .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #8b949e;
            margin-bottom: 10px;
        }
        .signal-box .empty {
            color: #8b949e;
            font-style: italic;
            text-align: center;
            padding: 18px 0;
        }
        .signal-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 24px;
            align-items: baseline;
        }
        .signal-row .market-name {
            font-size: 26px;
            font-weight: 700;
            color: #f0883e;
        }
        .signal-row .badge {
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            background: #21262d;
        }
        .badge.weak {
            background: #3d2a1a;
            color: #e6b07a;
        }
        .badge.strong {
            background: #1a3d2a;
            color: #7ae6b0;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid #21262d;
        }
        .stat-item {
            background: #0d1117;
            border-radius: 10px;
            padding: 8px 6px;
            text-align: center;
        }
        .stat-item .num {
            font-size: 18px;
            font-weight: 600;
            color: #f0f6fc;
        }
        .stat-item .desc {
            font-size: 10px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-top: 2px;
        }
        .burst-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }
        .burst-tags span {
            background: #1c2333;
            padding: 3px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #f0883e;
            border: 1px solid #2d3748;
        }
        .loading-dots::after {
            content: '';
            animation: dots 1.2s steps(4, end) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
        .footer {
            margin-top: 18px;
            font-size: 11px;
            color: #484f58;
            text-align: center;
            border-top: 1px solid #21262d;
            padding-top: 16px;
        }
    </style>
</head>
<body>

<div class="app-container">

    <!-- LOGIN SCREEN (RESTORED) -->
    <div id="loginScreen">
        <h2>🔐 Deriv Signal Engine</h2>
        <p>Enter your password to unlock and start collecting ticks</p>
        <input type="password" id="passwordInput" placeholder="Enter password..." autocomplete="off" />
        <br />
        <button id="loginBtn">Unlock & Connect</button>
        <div id="loginError"></div>
    </div>

    <!-- MAIN APP (RESTORED) -->
    <div id="mainApp">
        <div class="header">
            <h1>⚡ Burst Engine <small>Deriv Live</small></h1>
            <span id="statusBar">⏳ Connecting...</span>
        </div>

        <!-- 6 SIGNAL BUTTONS -->
        <div class="signal-buttons">
            <button class="primary-btn" id="btnMatches" disabled>🎯 Matches</button>
            <button class="primary-btn" id="btnDiffer" disabled>🔄 Differ</button>
            <button id="btnOver" disabled>📈 Over</button>
            <button id="btnUnder" disabled>📉 Under</button>
            <button id="btnEven" disabled>⚪ Even</button>
            <button id="btnOdd" disabled>⚫ Odd</button>
        </div>

        <!-- SIGNAL DISPLAY -->
        <div id="signalBox" class="signal-box">
            <div class="label">📡 Signal Output</div>
            <div id="signalContent" class="empty">Collecting ticks from 10 markets simultaneously...</div>
        </div>

        <div class="footer">
            Engine v2.0 (Burst + Indicator) • No filters • Always returns best candidate • Analysis: 10 seconds
        </div>
    </div>
</div>

<script>
    // ================================================================
    // 1. CONFIG & FIXES (APPLIED)
    // ================================================================
    const CONFIG = {
        TICK_WINDOW: 30, // FIX 3
        INITIAL_COUNT: 100,
        MIN_CONFIDENCE: 45, // FIX 1 (removed minScore)
        MIN_GAP: 0.03, // FIX 2
        SIGMOID_MULTIPLIER: 2.2, // FIX 4
        ANALYSIS_DELAY: 10000, // FIX 7: 10 seconds (was 3000) <-- CHANGED HERE
    };

    // 10 DERIV MARKETS (Volatility 1s + Jump Indices)
    const MARKETS = [
        'R_10', 'R_25', 'R_50', 'R_75', 'R_100',
        '1HZ10V', '1HZ25V', '1HZ50V', '1HZ75V', '1HZ100V'
    ];

    // State
    let tickBuffers = {};
    let collectionCounts = {};
    let isUnlocked = false;
    let ws = null;
    let isAnalyzing = false;

    // UI refs
    const loginScreen = document.getElementById('loginScreen');
    const mainApp = document.getElementById('mainApp');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const statusBar = document.getElementById('statusBar');
    const signalBox = document.getElementById('signalBox');
    const signalContent = document.getElementById('signalContent');

    const btnMatches = document.getElementById('btnMatches');
    const btnDiffer = document.getElementById('btnDiffer');
    const btnOver = document.getElementById('btnOver');
    const btnUnder = document.getElementById('btnUnder');
    const btnEven = document.getElementById('btnEven');
    const btnOdd = document.getElementById('btnOdd');
    const allButtons = [btnMatches, btnDiffer, btnOver, btnUnder, btnEven, btnOdd];

    // ================================================================
    // 2. INITIALIZE BUFFERS
    // ================================================================
    function initBuffers() {
        MARKETS.forEach(m => {
            tickBuffers[m] = [];
            collectionCounts[m] = 0;
        });
    }
    initBuffers();

    // ================================================================
    // 3. DERIV WEBSOCKET ENGINE (SIMULTANEOUS COLLECTION)
    // ================================================================
    function updateStatus(text, isReady = false) {
        statusBar.textContent = text;
        if (isReady) {
            statusBar.classList.add('ready');
        } else {
            statusBar.classList.remove('ready');
        }
    }

    function checkUnlock() {
        // Unlock when all 10 markets have at least INITIAL_COUNT ticks
        const allReady = MARKETS.every(m => (tickBuffers[m]?.length || 0) >= CONFIG.INITIAL_COUNT);
        if (allReady && !isUnlocked) {
            isUnlocked = true;
            updateStatus('✅ All markets ready – Signals unlocked', true);
            allButtons.forEach(b => b.disabled = false);
            signalContent.className = 'empty';
            signalContent.textContent = 'Press any signal button to analyze. (10-second scan)';
        } else if (!allReady) {
            const readyCount = MARKETS.filter(m => (tickBuffers[m]?.length || 0) >= CONFIG.INITIAL_COUNT).length;
            updateStatus(`⏳ Loading ticks: ${readyCount}/${MARKETS.length} markets ready`);
        }
    }

    function extractDigitFromTick(tick) {
        const price = tick.quote;
        return Math.floor(price) % 10;
    }

    function pushTick(market, digit) {
        if (!tickBuffers[market]) return;
        const buf = tickBuffers[market];
        buf.push(digit);
        // Enforce rolling window (FIX 3)
        if (buf.length > CONFIG.TICK_WINDOW) {
            buf.shift();
        }
        // Track collection progress (only count until we hit INITIAL_COUNT)
        if (collectionCounts[market] < CONFIG.INITIAL_COUNT) {
            collectionCounts[market] = Math.min(CONFIG.INITIAL_COUNT, collectionCounts[market] + 1);
        }
        checkUnlock();
    }

    function requestHistory(market) {
        return new Promise((resolve) => {
            if (!ws || ws.readyState !== WebSocket.OPEN) { resolve(false); return; }
            const req = {
                ticks_history: market,
                end: 'latest',
                start: 1,
                count: CONFIG.INITIAL_COUNT,
                style: 'ticks',
                adjust_start_time: 1,
                req_id: `hist_${market}_${Date.now()}`
            };
            const handler = (event) => {
                const data = JSON.parse(event.data);
                if (data.req_id === req.req_id && data.history?.ticks) {
                    ws.removeEventListener('message', handler);
                    const ticks = data.history.ticks;
                    // Push in chronological order (oldest first)
                    for (const tick of ticks) {
                        const digit = extractDigitFromTick(tick);
                        pushTick(market, digit);
                    }
                    resolve(true);
                }
            };
            ws.addEventListener('message', handler);
            ws.send(JSON.stringify(req));
            setTimeout(() => { ws.removeEventListener('message', handler);
                resolve(false); }, 5000);
        });
    }

    function subscribeMarket(market) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({
            ticks: market,
            subscribe: 1,
            req_id: `sub_${market}_${Date.now()}`
        }));
    }

    function connectDeriv() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            // Already connected, just refetch histories
            fetchAllHistories();
            return;
        }

        ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1089');

        ws.onopen = () => {
            updateStatus('🟢 Connected. Fetching 100 ticks for all markets...');
            fetchAllHistories();
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            // Live tick
            if (data.tick && data.tick.symbol) {
                const market = data.tick.symbol;
                if (MARKETS.includes(market)) {
                    const digit = extractDigitFromTick(data.tick);
                    pushTick(market, digit);
                }
            }
            if (data.error) {
                console.warn('Deriv WS error:', data.error.message);
            }
        };

        ws.onclose = () => {
            updateStatus('🔴 Disconnected. Reconnect manually.', false);
        };
        ws.onerror = (err) => {
            console.error('WS Error:', err);
            updateStatus('⚠️ Connection error', false);
        };
    }

    async function fetchAllHistories() {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            updateStatus('❌ Not connected', false);
            return;
        }
        // Reset buffers before fetching
        initBuffers();
        isUnlocked = false;
        allButtons.forEach(b => b.disabled = true);
        signalContent.className = 'empty';
        signalContent.textContent = '⏳ Fetching histories simultaneously...';

        const promises = MARKETS.map(m => requestHistory(m));
        await Promise.all(promises);

        // Subscribe to live ticks for all markets
        for (const market of MARKETS) {
            subscribeMarket(market);
        }

        // Re-check unlock after a short delay to let history ticks process
        setTimeout(() => {
            checkUnlock();
            if (!isUnlocked) {
                signalContent.textContent = '⚠️ Still loading ticks. Waiting for live stream...';
            }
        }, 1000);
    }

    // ================================================================
    // 4. BURST + INDICATOR ENGINE (APPLIED TO 6 SIGNAL TYPES)
    // ================================================================

    function detectBurst(digits) {
        if (!digits || digits.length < 10) return [];
        const last10 = digits.slice(-10);
        const under = last10.filter(d => d < 5).length;
        const over = last10.filter(d => d > 4).length;
        const even = last10.filter(d => d % 2 === 0).length;
        const odd = last10.filter(d => d % 2 !== 0).length;
        const signals = [];
        if (under >= 7) signals.push({ type: 'UNDER_BURST', strength: under });
        if (over >= 7) signals.push({ type: 'OVER_BURST', strength: over });
        if (even >= 7) signals.push({ type: 'EVEN_BURST', strength: even });
        if (odd >= 7) signals.push({ type: 'ODD_BURST', strength: odd });
        return signals;
    }

    // ---- scoring helpers ----
    function computeMass(digits) {
        if (!digits || digits.length === 0) return 0.5;
        const sum = digits.reduce((a, b) => a + b, 0);
        return sum / digits.length / 9;
    }

    function computeMargin(digits) {
        if (!digits || digits.length < 5) return 0;
        const last5 = digits.slice(-5);
        const avgLast5 = last5.reduce((a, b) => a + b, 0) / last5.length;
        const avgAll = digits.reduce((a, b) => a + b, 0) / digits.length;
        return (avgLast5 - avgAll) / 9;
    }

    function computeEntropy(digits) {
        if (!digits || digits.length < 2) return 1;
        const freq = Array(10).fill(0);
        digits.forEach(d => freq[d]++);
        let ent = 0;
        for (let i = 0; i < 10; i++) {
            if (freq[i] === 0) continue;
            const p = freq[i] / digits.length;
            ent -= p * Math.log2(p);
        }
        return ent / Math.log2(10);
    }

    function computeTransition(digits) {
        if (!digits || digits.length < 2) return 0;
        let changes = 0;
        for (let i = 1; i < digits.length; i++) {
            if (digits[i] !== digits[i - 1]) changes++;
        }
        return changes / (digits.length - 1);
    }

    // ---- score for each signal type ----
    function calculateMetric(digits, type) {
        if (!digits || digits.length < CONFIG.TICK_WINDOW) return { raw: 0, confidence: 0 };

        const len = digits.length;
        let raw = 0;

        switch (type) {
            case 'MATCH': {
                const mass = computeMass(digits);
                const margin = computeMargin(digits);
                const entropy = computeEntropy(digits);
                const trans = computeTransition(digits);
                raw = (mass * 1.35) + (margin * 0.95) - ((1 - entropy) * 0.3) - ((1 - trans) * 0.2);
                raw = Math.max(0.05, Math.min(2.0, raw));
                break;
            }
            case 'DIFFER': {
                const trans = computeTransition(digits);
                const entropy = computeEntropy(digits);
                raw = (trans * 1.2) + (entropy * 0.8) - 0.3;
                raw = Math.max(0.05, Math.min(2.0, raw));
                break;
            }
            case 'OVER': {
                const over = digits.filter(d => d > 4).length / len;
                raw = over * 2.0;
                break;
            }
            case 'UNDER': {
                const under = digits.filter(d => d < 5).length / len;
                raw = under * 2.0;
                break;
            }
            case 'EVEN': {
                const even = digits.filter(d => d % 2 === 0).length / len;
                raw = even * 2.0;
                break;
            }
            case 'ODD': {
                const odd = digits.filter(d => d % 2 !== 0).length / len;
                raw = odd * 2.0;
                break;
            }
            default:
                raw = 0;
        }

        // Confidence via sigmoid (FIX 4)
        const conf = 1 / (1 + Math.exp(-raw * CONFIG.SIGMOID_MULTIPLIER));
        const confidence = Math.max(CONFIG.MIN_CONFIDENCE, Math.round(conf * 100));
        return { raw, confidence };
    }

    // ---- scan all markets for a specific type ----
    function scanMarkets(type) {
        const candidates = [];
        for (const market of MARKETS) {
            const digits = tickBuffers[market];
            if (!digits || digits.length < CONFIG.TICK_WINDOW) continue;

            const bursts = detectBurst(digits);
            const metric = calculateMetric(digits, type);
            let finalScore = metric.raw;

            // Burst boost (event-first)
            if (bursts.length > 0) {
                finalScore = finalScore * 1.2;
            }

            // Even/Odd gap penalty (FIX 2: penalty instead of kill)
            if (digits.length >= 10) {
                const last10 = digits.slice(-10);
                const evens = last10.filter(d => d % 2 === 0).length;
                const odds = last10.filter(d => d % 2 !== 0).length;
                const gap = Math.abs(evens - odds) / 10;
                if (gap < CONFIG.MIN_GAP) {
                    finalScore = finalScore * 0.85;
                }
            }

            candidates.push({
                market,
                score: finalScore,
                confidence: metric.confidence,
                bursts,
                rawScore: metric.raw,
            });
        }

        candidates.sort((a, b) => b.score - a.score);
        return candidates.length > 0 ? candidates[0] : null;
    }

    // ---- generate signal for a given type ----
    function generateSignal(type) {
        const result = scanMarkets(type);
        if (!result) {
            return {
                success: false,
                message: '⏳ Not enough ticks yet. Wait for live data.',
            };
        }
        const weak = result.score < 0.5;
        return {
            success: true,
            type: type,
            market: result.market,
            score: result.score,
            confidence: result.confidence,
            bursts: result.bursts,
            weak: weak,
            rawScore: result.rawScore,
        };
    }

    // ================================================================
    // 5. UI BINDINGS (WITH 10-SECOND ANIMATION)
    // ================================================================

    function renderSignal(signal) {
        if (!signal || !signal.success) {
            signalBox.classList.remove('has-signal');
            signalContent.className = 'empty';
            signalContent.textContent = signal?.message || 'No signal available.';
            return;
        }

        signalBox.classList.add('has-signal');
        const weakLabel = signal.weak ? '⚠️ WEAK' : '✅ STRONG';
        const weakClass = signal.weak ? 'weak' : 'strong';

        let burstHtml = '';
        if (signal.bursts && signal.bursts.length > 0) {
            burstHtml = '<div class="burst-tags">' +
                signal.bursts.map(b => `<span>🔥 ${b.type} (${b.strength})</span>`).join('') +
                '</div>';
        } else {
            burstHtml = '<div class="burst-tags"><span style="color:#8b949e;">No burst detected</span></div>';
        }

        signalContent.innerHTML = `
            <div class="signal-row">
                <span class="market-name">${signal.market}</span>
                <span class="badge ${weakClass}">${weakLabel}</span>
                <span style="color:#8b949e;font-size:14px;">Score: ${signal.score.toFixed(3)}</span>
                <span style="color:#8b949e;font-size:13px;background:#21262d;padding:2px 12px;border-radius:40px;">${signal.type}</span>
            </div>
            <div class="stat-grid">
                <div class="stat-item">
                    <div class="num">${signal.confidence}%</div>
                    <div class="desc">Confidence</div>
                </div>
                <div class="stat-item">
                    <div class="num">${signal.rawScore?.toFixed(3) ?? '—'}</div>
                    <div class="desc">Raw Score</div>
                </div>
                <div class="stat-item">
                    <div class="num">${signal.bursts?.length ?? 0}</div>
                    <div class="desc">Bursts</div>
                </div>
                <div class="stat-item">
                    <div class="num">${CONFIG.TICK_WINDOW}</div>
                    <div class="desc">Window</div>
                </div>
            </div>
            ${burstHtml}
        `;
    }

    function handleSignalButton(type) {
        if (isAnalyzing) return;
        if (!isUnlocked) {
            signalContent.className = 'empty';
            signalContent.textContent = '⏳ Please wait for all markets to load (100 ticks each).';
            return;
        }

        isAnalyzing = true;
        allButtons.forEach(b => b.disabled = true);

        // Show loading animation with dots (10-second delay)
        signalBox.classList.remove('has-signal');
        signalContent.className = 'empty';
        signalContent.textContent = `⏳ Analyzing ${type} across 10 markets... (10 seconds)`;

        setTimeout(() => {
            const signal = generateSignal(type);
            renderSignal(signal);
            isAnalyzing = false;
            allButtons.forEach(b => b.disabled = false);
            // Re-lock individual? No, keep them all enabled if unlocked.
        }, CONFIG.ANALYSIS_DELAY); // 10 seconds
    }

    // ---- Login logic ----
    loginBtn.addEventListener('click', () => {
        const pwd = passwordInput.value.trim();
        if (pwd === '') {
            loginError.textContent = '⚠️ Please enter a password.';
            return;
        }
        // Simple unlock (any password works for demo, but preserves the flow)
        loginError.textContent = '';
        loginScreen.style.display = 'none';
        mainApp.style.display = 'block';
        // Start connection
        connectDeriv();
    });

    // Allow Enter key on password input
    passwordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') loginBtn.click();
