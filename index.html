<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithmic Trading Dashboard</title>
    <style>
        :root {
            --bg-dark: #0B0E14;
            --panel-bg: #151A22;
            --border-color: #262F3D;
            --text-main: #E2E8F0;
            --text-muted: #718096;
            --neon-gold: #FFD700;
            --neon-green: #00FFAA;
            --neon-orange: #FF6B00;
            --neon-blue: #00BFFF;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .big-digit {
            font-size: 3.5rem;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
        }

        .matches { color: var(--neon-green); }
        .differs { color: var(--neon-orange); }

        .confidence-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }

        .confidence-label {
            font-weight: bold;
            min-width: 50px;
        }

        .confidence-bar {
            flex-grow: 1;
            background-color: #2D3748;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-orange), var(--neon-green));
            width: 0%;
            transition: width 0.3s ease;
        }

        .bottom-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
            margin-top: 15px;
        }

        .confidence-level {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .btn-entry {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            background-color: #2B6CB0;
            color: white;
            transition: background 0.2s;
        }

        .btn-entry:disabled {
            background-color: #4A5568;
            cursor: not-allowed;
        }

        .placeholder-box {
            color: var(--text-muted);
            text-align: center;
            padding: 30px 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="card" id="signalCard">
            <div class="placeholder-box">Select an engine logic to begin scanning markets...</div>
        </div>

        <div class="card" id="ouCard">
            <div class="row"><span>Over/Under Market</span><span id="ouMarket">--</span></div>
            <div class="big-digit" style="color:var(--neon-gold);">--</div>
            <div class="confidence-row">
                <span class="confidence-label" id="ouConfidenceValue">0.0%</span>
                <div class="confidence-bar"><div class="confidence-fill" id="ouConfidenceFill"></div></div>
            </div>
            <div class="bottom-row">
                <span>Observed: <span id="ouObserved">--</span></span>
                <span>Edge: <span id="ouEdge">--</span></span>
            </div>
            <button class="btn-entry" id="btnFindEntryOU" disabled>🔍 FIND ENTRY</button>
        </div>

        <div class="card" id="eoCard">
            <div class="row"><span>Even/Odd Market</span><span id="eoMarket">--</span></div>
            <div class="big-digit">--</div>
            <div class="bottom-row">
                <span>PMR: <span id="eoPMR">--</span></span>
                <span>Z: <span id="eoZScore">--</span></span>
            </div>
            <button class="btn-entry" id="btnFindEntryEO" disabled>🔍 FIND ENTRY</button>
        </div>
    </div>

    <script>
        /*****************************************************************
         * 1) CONSTANTS AND GLOBAL STATE
         *****************************************************************/
        const ANALYSIS_WINDOW = 100;
        const LIVE_CONFIRM_WINDOW = 25;
        const SIGNAL_DELAY_MS = 800;

        // Mock State Containers representing system variables
        let tickBuffers = {
            "R_10": Array.from({length: 120}, () => ({ digit: Math.floor(Math.random() * 10) })),
            "R_25": Array.from({length: 120}, () => ({ digit: Math.floor(Math.random() * 10) })),
            "R_50": Array.from({length: 120}, () => ({ digit: Math.floor(Math.random() * 10) }))
        };
        let signalTimers = { md: null, ou: null, eo: null };
        let currentSignal = { match: null, differ: null, ou: null, eo: null, activeEngine: null };
        let marketHistory = [];

        /*****************************************************************
         * 2) SHARED HELPERS
         *****************************************************************/
        function latestWindow(digits, size) {
            if (!digits || !digits.length) return [];
            return digits.slice(-size);
        }

        function frequency(window) {
            const counts = {};
            window.forEach(d => counts[d] = (counts[d] || 0) + 1);
            // Return distribution ratios relative to window size
            const total = window.length || 1;
            const dist = {};
            for (let i = 0; i < 10; i++) {
                dist[i] = (counts[i] || 0) / total;
            }
            return dist;
        }

        function entropyFreq(freq) {
            let ent = 0;
            for (let k in freq) {
                const p = freq[k];
                if (p > 0) ent -= p * Math.log2(p);
            }
            return ent;
        }

        function concentrationFreq(freq) {
            let sumSq = 0;
            for (let k in freq) {
                sumSq += Math.pow(freq[k], 2);
            }
            return sumSq;
        }

        function transitionRate(window) {
            if (window.length <= 1) return 0;
            let changes = 0;
            for (let i = 1; i < window.length; i++) {
                if (window[i] !== window[i - 1]) changes++;
            }
            return changes / (window.length - 1);
        }

        function norm(score) {
            // Soft logistic bounding for normalization visual bar
            return 1 / (1 + Math.exp(-score));
        }

        function clampScore(score, min, max) {
            return Math.max(min, Math.min(max, score));
        }

        function softNormalize(score) {
            return norm(score);
        }

        function safeNumber(v, fallback = 0) {
            const n = Number(v);
            return Number.isFinite(n) ? n : fallback;
        }

        function pickBestCandidate(candidates) {
            let best = null;
            for (const item of candidates) {
                if (!best || item.score > best.score) {
                    best = item;
                } else if (best && item.score === best.score && Math.random() > 0.5) {
                    best = item; // Tie-breaker variance prevents fallback lockups
                }
            }
            return best;
        }

        function getDigitsFromMarket(market) {
            const data = tickBuffers[market];
            if (!data || !data.length) return [];
            return data.map(t => t.digit).filter(d => Number.isInteger(d) && d >= 0 && d <= 9);
        }

        function getSignalWindow(market, size = ANALYSIS_WINDOW) {
            return latestWindow(getDigitsFromMarket(market), size);
        }

        /*****************************************************************
         * 3) MARKET HELPERS
         *****************************************************************/
        function rememberMarket(market) {
            marketHistory.push(market);
            if (marketHistory.length > 5) marketHistory.shift();
        }

        function marketRotationPenalty(market) {
            return marketHistory.includes(market) ? 0.15 : 0;
        }

        function findBestMarket() {
            let best = null;
            let maxScore = -Infinity;
            for (const market in tickBuffers) {
                const digits = getDigitsFromMarket(market);
                if (digits.length < ANALYSIS_WINDOW) continue;
                
                const freq = frequency(latestWindow(digits, ANALYSIS_WINDOW));
                const entropy = entropyFreq(freq);
                const score = (3.5 - entropy) - marketRotationPenalty(market);

                if (score > maxScore) {
                    maxScore = score;
                    best = { market, entropy, score };
                }
            }
            if (best) rememberMarket(best.market);
            return best;
        }

        /*****************************************************************
         * 4) SCORING HELPERS (Patched & Safe)
         *****************************************************************/
        function matchScore(digits, digit, windowSize = 100) {
            const window = latestWindow(digits, windowSize);
            if (!window.length) return { score: -Infinity, features: { f: 0, persist: 0, ent: 0, conc: 0, trans: 0, freq: {} } };

            const freq = frequency(window);
            const f = typeof freq[digit] !== 'undefined' ? freq[digit] : 0;

            const segCount = 5;
            const step = Math.max(1, Math.floor(window.length / segCount));
            let persistHits = 0;

            for (let i = 0; i < segCount; i++) {
                const end = window.length - i * step;
                const start = Math.max(0, end - step);
                const seg = window.slice(start, end);
                if (!seg.length) continue;
                const cnt = seg.filter(d => d === digit).length;
                if (cnt / seg.length >= 0.14) persistHits++;
            }

            const persist = persistHits / segCount;
            const ent = entropyFreq(freq);
            const conc = concentrationFreq(freq);
            const trans = transitionRate(window);

            const targetBoost = f * 1.4;
            const consistencyBoost = persist * 1.0;
            const compactnessBoost = conc * 0.5;
            const instabilityPenalty = ent * 0.35 + trans * 0.18;

            const tieBreaker = (Math.random() - 0.5) * 0.00001;

            const score = targetBoost + consistencyBoost + compactnessBoost - instabilityPenalty + tieBreaker;
            return { score, features: { f, persist, ent, conc, trans, freq } };
        }

        function differScore(digits, digit, windowSize = 100) {
            const window = latestWindow(digits, windowSize);
            if (!window.length) return { score: -Infinity, features: { f: 0, persist: 0, ent: 0, conc: 0, trans: 0, freq: {} } };

            const freq = frequency(window);
            const f = typeof freq[digit] !== 'undefined' ? freq[digit] : 0;

            const segCount = 5;
            const step = Math.max(1, Math.floor(window.length / segCount));
            let persistHits = 0;

            for (let i = 0; i < segCount; i++) {
                const end = window.length - i * step;
                const start = Math.max(0, end - step);
                const seg = window.slice(start, end);
                if (!seg.length) continue;
                const cnt = seg.filter(d => d === digit).length;
                if (cnt / seg.length <= 0.10) persistHits++;
            }

            const persist = persistHits / segCount;
            const ent = entropyFreq(freq);
            const conc = concentrationFreq(freq);
            const trans = transitionRate(window);

            const normalizedF = f > 1 ? f / window.length : f;

            const rarityBoost = (1 - normalizedF) * 1.25;
            const spreadBoost = (1 - conc) * 0.45;
            const consistencyBoost = persist * 0.95;
            const stabilityBoost = (1 - trans) * 0.20;

            const tieBreaker = (Math.random() - 0.5) * 0.00001;

            const score = rarityBoost + spreadBoost + consistencyBoost + stabilityBoost + (ent * 0.15) + tieBreaker;
            return { score, features: { f, persist, ent, conc, trans, freq } };
        }

        function overUnderScore(digits, mode, barrier, windowSize = 100) {
            const window = latestWindow(digits, windowSize);
            if (!window.length) return { score: -Infinity, features: { mass: 0, margin: 0, persist: 0, ent: 0, conc: 0, reject: 0, freq: {} } };

            const freq = frequency(window);

            let mass = 0;
            if (mode === 'OVER') {
                for (let d = barrier + 1; d < 10; d++) {
                    mass += (typeof freq[d] !== 'undefined' ? freq[d] : 0);
                }
            } else {
                for (let d = 0; d < barrier; d++) {
                    mass += (typeof freq[d] !== 'undefined' ? freq[d] : 0);
                }
            }

            const totalCount = window.length;
            const overCount = window.filter(d => d > barrier).length;
            const underCount = window.filter(d => d < barrier).length;

            const margin = mode === 'OVER'
                ? Math.max(0, overCount / totalCount - 0.5)
                : Math.max(0, underCount / totalCount - 0.5);

            const segCount = 5;
            const step = Math.max(1, Math.floor(window.length / segCount));
            let persistHits = 0;

            for (let i = 0; i < segCount; i++) {
                const end = window.length - i * step;
                const start = Math.max(0, end - step);
                const seg = window.slice(start, end);
                if (!seg.length) continue;
                const cnt = seg.filter(d => mode === 'OVER' ? d > barrier : d < barrier).length;
                if (cnt / seg.length >= 0.56) persistHits++;
            }

            const persist = persistHits / segCount;
            const ent = entropyFreq(freq);
            const conc = concentrationFreq(freq);
            const reject = transitionRate(window);

            const normalizedMass = mass > 1 ? mass / totalCount : mass;

            const directionBoost = normalizedMass * 1.25;
            const edgeBoost = margin * 0.85;
            const consistencyBoost = persist * 0.95;
            const stabilityBoost = conc * 0.30;
            const penalty = ent * 0.30 + reject * 0.45;

            const tieBreaker = (Math.random() - 0.5) * 0.00001;

            const score = directionBoost + edgeBoost + consistencyBoost + stabilityBoost - penalty + tieBreaker;
            return { score, features: { mass: normalizedMass, margin, persist, ent, conc, reject, freq } };
        }

        function evenOddScore(digits, side, windowSize = 100) {
            const window = latestWindow(digits, windowSize);
            if (!window.length) return { score: -Infinity, features: { mass: 0, margin: 0, persist: 0, ent: 0, conc: 0, flipRate: 0, freq: {} } };

            const freq = frequency(window);
            const target = side === 'EVEN' ? [0, 2, 4, 6, 8] : [1, 3, 5, 7, 9];

            let mass = 0;
            target.forEach(d => { 
                mass += (typeof freq[d] !== 'undefined' ? freq[d] : 0); 
            });

            const totalCount = window.length;
            const margin = Math.max(0, window.filter(d => target.includes(d)).length / totalCount - 0.5);

            const segCount = 5;
            const step = Math.max(1, Math.floor(window.length / segCount));
            let persistHits = 0;

            for (let i = 0; i < segCount; i++) {
                const end = window.length - i * step;
                const start = Math.max(0, end - step);
                const seg = window.slice(start, end);
                if (!seg.length) continue;
                const cnt = seg.filter(d => target.includes(d)).length;
                if (cnt / seg.length >= 0.56) persistHits++;
            }

            const persist = persistHits / segCount;
            const ent = entropyFreq(freq);
            const conc = concentrationFreq(freq);

            let flips = 0;
            for (let i = 1; i < window.length; i++) {
                const prev = target.includes(window[i - 1]);
                const cur = target.includes(window[i]);
                if (prev !== cur) flips++;
            }
            const flipRate = window.length > 1 ? flips / (window.length - 1) : 0;

            const normalizedMass = mass > 1 ? mass / totalCount : mass;

            const directionBoost = normalizedMass * 1.25;
            const edgeBoost = margin * 0.85;
            const consistencyBoost = persist * 0.95;
            const compactnessBoost = conc * 0.25;
            const penalty = ent * 0.30 + flipRate * 0.45;

            const tieBreaker = (Math.random() - 0.5) * 0.00001;

            const score = directionBoost + edgeBoost + consistencyBoost + compactnessBoost - penalty + tieBreaker;
            return { score, features: { mass: normalizedMass, margin, persist, ent, conc, flipRate, freq } };
        }

        /*****************************************************************
         * 5) UI HELPERS
         *****************************************************************/
        function beginSignalLoading(engine, label, msg) {
            const card = document.getElementById('signalCard');
            if(card) card.innerHTML = `<div class="placeholder-box"><strong>${label}</strong><br>${msg}</div>`;
            return true;
        }

        function failSignalLoading(engine, msg) {
            const card = document.getElementById('signalCard');
            if(card) card.innerHTML = `<div class="placeholder-box" style="color:var(--neon-orange);">${msg}</div>`;
            return false;
        }

        function endSignalLoading(engine) { /* Loading visual finalizer interface wrap */ }
        function resetActiveSignal(type) { currentSignal.activeEngine = type; }
        function updateFrequencyChart(m) {}
        function updateMatrixAndSeesaw(m) {}

        function setSignalCard(html) {
            const card = document.getElementById('signalCard');
            if (card) card.innerHTML = html;
        }

        function setOUCard(html) {
            const card = document.getElementById('ouCard');
            if (card) card.innerHTML = html;
        }

        function setEOCard(html) {
            const card = document.getElementById('eoCard');
            if (card) card.innerHTML = html;
        }

        /*****************************************************************
         * 6) SIGNAL GENERATORS (Patched Async Logic)
         *****************************************************************/
        function generateMatchesSignal() {
            resetActiveSignal('match');
            if (signalTimers.md) clearTimeout(signalTimers.md);

            if (!beginSignalLoading('md', 'GENERATING MATCH SIGNAL...', '⏳ Analyzing latest ticks for Matches...')) return;

            const best = findBestMarket();
            if (!best) return failSignalLoading('md', '⏳ No market has enough data yet.');

            const data = tickBuffers[best.market];
            if (!data || data.length < ANALYSIS_WINDOW) {
                return failSignalLoading('md', `⏳ Need at least ${ANALYSIS_WINDOW} ticks.`);
            }

            signalTimers.md = setTimeout(() => {
                try {
                    const digits = getSignalWindow(best.market, ANALYSIS_WINDOW);
                    if (!digits.length) throw new Error('No digits');

                    const candidates = [];
                    for (let d = 0; d < 10; d++) {
                        const ms = matchScore(digits, d, ANALYSIS_WINDOW);
                        candidates.push({ digit: d, score: ms.score, features: ms.features });
                    }

                    if (candidates.length > 1) {
                        candidates.sort((a, b) => {
                            const diff = b.score - a.score;
                            if (Math.abs(diff) < 0.02) return Math.random() - 0.5;
                            return diff;
                        });
                    }

                    const bestMatch = candidates[0];
                    if (!bestMatch) throw new Error('No match candidate');

                    currentSignal.match = { market: best.market, entropy: best.entropy, bestMatch };
                    currentSignal.activeEngine = 'match';

                    const confidence = Math.max(5, Math.min(99, norm(bestMatch.score) * 100));
                    const level = confidence > 70 ? 'HIGH' : confidence > 55 ? 'MEDIUM' : 'LOW';
                    const levelColor = level === 'HIGH' ? '#00FFAA' : level === 'MEDIUM' ? '#FFD700' : '#FF6B00';

                    setSignalCard(`
                        <div class="row"><span>${best.market}</span><span>H = ${best.entropy.toFixed(2)}</span></div>
                        <div class="big-digit matches">${bestMatch.digit}</div>
                        <div class="entry-text"><strong>Match Digit: ${bestMatch.digit}</strong></div>
                        <div class="action-text matches">MATCH ON ${bestMatch.digit}</div>
                        <div class="confidence-row">
                            <span class="confidence-label">${confidence.toFixed(1)}%</span>
                            <div class="confidence-bar"><div class="confidence-fill" style="width:${confidence}%;"></div></div>
                        </div>
                        <div class="bottom-row">
                            <span>DFR: ${(safeNumber(bestMatch.features.f) * 100).toFixed(1)}%</span>
                            <span>PERS: ${safeNumber(bestMatch.features.persist) > 0.6 ? 'HIGH' : safeNumber(bestMatch.features.persist) > 0.4 ? 'MEDIUM' : 'LOW'}</span>
                        </div>
                        <div class="confidence-level" style="color:${levelColor};">${level} CONFIDENCE</div>
                        <button class="btn-entry entry-default" id="btnFindEntryMD">🔍 FIND ENTRY</button>
                    `);

                    updateFrequencyChart(best.market);
                    updateMatrixAndSeesaw(best.market);
                } catch (e) {
                    console.error(e);
                    failSignalLoading('md', '❌ Failed to generate match signal.');
                    return;
                } finally {
                    endSignalLoading('md');
                }
            }, SIGNAL_DELAY_MS);
        }

        function generateDiffersSignal() {
            resetActiveSignal('differ');
            if (signalTimers.md) clearTimeout(signalTimers.md);

            if (!beginSignalLoading('md', 'GENERATING DIFFER SIGNAL...', '⏳ Analyzing latest ticks for Differs...')) return;

            const best = findBestMarket();
            if (!best) return failSignalLoading('md', '⏳ No market has enough data yet.');

            const data = tickBuffers[best.market];
            if (!data || data.length < ANALYSIS_WINDOW) {
                return failSignalLoading('md', `⏳ Need at least ${ANALYSIS_WINDOW} ticks.`);
            }

            signalTimers.md = setTimeout(() => {
                try {
                    const digits = getSignalWindow(best.market, ANALYSIS_WINDOW);
                    if (!digits.length) throw new Error('No digits');

                    const candidates = [];
                    for (let d = 0; d < 10; d++) {
                        const ds = differScore(digits, d, ANALYSIS_WINDOW);
                        candidates.push({ digit: d, score: ds.score, features: ds.features });
                    }

                    if (candidates.length > 1) {
                        candidates.sort((a, b) => {
                            const diff = b.score - a.score;
                            if (Math.abs(diff) < 0.02) return Math.random() - 0.5;
                            return diff;
                        });
                    }

                    const bestDiffer = candidates[0];
                    if (!bestDiffer) throw new Error('No differ candidate');

                    currentSignal.differ = { market: best.market, entropy: best.entropy, bestDiffer };
                    currentSignal.activeEngine = 'differ';

                    const confidence = Math.max(5, Math.min(99, norm(bestDiffer.score) * 100));
                    const level = confidence > 70 ? 'HIGH' : confidence > 55 ? 'MEDIUM' : 'LOW';
                    const levelColor = level === 'HIGH' ? '#00FFAA' : level === 'MEDIUM' ? '#FFD700' : '#FF6B00';

                    setSignalCard(`
                        <div class="row"><span>${best.market}</span><span>H = ${best.entropy.toFixed(2)}</span></div>
                        <div class="big-digit differs">${bestDiffer.digit}</div>
                        <div class="entry-text"><strong>Differ Digit: ${bestDiffer.digit}</strong></div>
                        <div class="action-text differs">DIFFER ON ${bestDiffer.digit}</div>
                        <div class="confidence-row">
                            <span class="confidence-label">${confidence.toFixed(1)}%</span>
                            <div class="confidence-bar"><div class="confidence-fill" style="width:${confidence}%;"></div></div>
                        </div>
                        <div class="bottom-row">
                            <span>DFR: ${(safeNumber(bestDiffer.features.f) * 100).toFixed(1)}%</span>
                            <span>PERS: ${safeNumber(bestDiffer.features.persist) > 0.6 ? 'HIGH' : safeNumber(bestDiffer.features.persist) > 0.4 ? 'MEDIUM' : 'LOW'}</span>
                        </div>
                        <div class="confidence-level" style="color:${levelColor};">${level} CONFIDENCE</div>
                        <button class="btn-entry entry-default" id="btnFindEntryMD">🔍 FIND ENTRY</button>
                    `);

                    updateFrequencyChart(best.market);
                    updateMatrixAndSeesaw(best.market);
                } catch (e) {
                    console.error(e);
                    failSignalLoading('md', '❌ Failed to generate differ signal.');
                    return;
                } finally {
                    endSignalLoading('md');
                }
            }, SIGNAL_DELAY_MS);
        }

        function generateOverUnderSignal() {
            resetActiveSignal('ou');
            if (signalTimers.ou) clearTimeout(signalTimers.ou);

            if (!beginSignalLoading('ou', 'GENERATING OVER/UNDER SIGNAL...', '⏳ Analyzing latest ticks for Over/Under...')) return;

            const best = findBestMarket();
            if (!best) return failSignalLoading('ou', '⏳ No market has enough data yet.');

            const data = tickBuffers[best.market];
            if (!data || data.length < ANALYSIS_WINDOW) {
                return failSignalLoading('ou', `⏳ Need at least ${ANALYSIS_WINDOW} ticks.`);
            }

            signalTimers.ou = setTimeout(() => {
                try {
                    const digits = getSignalWindow(best.market, ANALYSIS_WINDOW);
                    if (!digits.length) throw new Error('No digits');

                    const candidates = [];
                    for (let barrier = 0; barrier < 10; barrier++) {
                        const over = overUnderScore(digits, 'OVER', barrier, ANALYSIS_WINDOW);
                        const under = overUnderScore(digits, 'UNDER', barrier, ANALYSIS_WINDOW);

                        candidates.push({ mode: 'OVER', barrier, score: over.score, features: over.features });
                        candidates.push({ mode: 'UNDER', barrier, score: under.score, features: under.features });
                    }

                    if (candidates.length > 1) {
                        candidates.sort((a, b) => {
                            const diff = b.score - a.score;
                            if (Math.abs(diff) < 0.02) return Math.random() - 0.5;
                            return diff;
                        });
                    }

                    const bestSetup = candidates[0];
                    if (!bestSetup) throw new Error('No over/under candidate');

                    currentSignal.ou = { market: best.market, entropy: best.entropy, bestSetup };
                    currentSignal.activeEngine = 'ou';

                    const confidence = Math.max(5, Math.min(99, norm(bestSetup.score) * 100));
                    const level = confidence > 70 ? 'HIGH' : confidence > 55 ? 'MEDIUM' : 'LOW';
                    const levelColor = level === 'HIGH' ? '#00FFAA' : level === 'MEDIUM' ? '#FFD700' : '#FF6B00';

                    setOUCard(`
                        <div class="row"><span>${best.market}</span><span>H = ${best.entropy.toFixed(2)}</span></div>
                        <div class="big-digit" style="color:var(--neon-gold);">${bestSetup.barrier}</div>
                        <div class="entry-text"><strong>${bestSetup.mode} ${bestSetup.barrier}</strong></div>
                        <div class="action-text" style="color:var(--neon-gold);">${bestSetup.mode} ${bestSetup.barrier}</div>
                        <div class="confidence-row">
                            <span class="confidence-label" style="color:${levelColor};">${confidence.toFixed(1)}%</span>
                            <div class="confidence-bar"><div class="confidence-fill" style="width:${confidence}%; background: linear-gradient(90deg, #FF6B00, ${levelColor});"></div></div>
                        </div>
                        <div class="bottom-row">
                            <span>Observed: ${(safeNumber(bestSetup.features.mass) * 100).toFixed(1)}%</span>
                            <span>Edge: ${((safeNumber(bestSetup.features.mass) - 0.5) * 100).toFixed(1)}%</span>
                        </div>
                        <div class="confidence-level" style="color:${levelColor};">${level} CONFIDENCE</div>
                    `);

                    const ouMarket = document.getElementById('ouMarket');
                    const ouConfidenceValue = document.getElementById('ouConfidenceValue');
                    const ouEdge = document.getElementById('ouEdge');
                    const ouObserved = document.getElementById('ouObserved');
                    const btn = document.getElementById('btnFindEntryOU');

                    if (ouMarket) ouMarket.textContent = best.market;
                    if (ouConfidenceValue) ouConfidenceValue.textContent = `${confidence.toFixed(1)}%`;
                    if (ouEdge) ouEdge.textContent = `${((safeNumber(bestSetup.features.mass) - 0.5) * 100).toFixed(1)}%`;
                    if (ouObserved) ouObserved.textContent = `${(safeNumber(bestSetup.features.mass) * 100).toFixed(1)}%`;
                    if (btn) {
                        btn.disabled = false;
                        btn.className = 'btn-entry entry-default';
                        btn.textContent = '🔍 FIND ENTRY';
                    }

                    updateFrequencyChart(best.market);
                    updateMatrixAndSeesaw(best.market);
                } catch (e) {
                    console.error(e);
                    failSignalLoading('ou', '❌ Failed to generate over/under signal.');
                    return;
                } finally {
                    endSignalLoading('ou');
                }
            }, SIGNAL_DELAY_MS);
        }

        function generateEvenOddSignal() {
            resetActiveSignal('eo');
            if (signalTimers.eo) clearTimeout(signalTimers.eo);

            if (!beginSignalLoading('eo', 'GENERATING EVEN/ODD SIGNAL...', '⏳ Analyzing latest ticks for Even/Odd...')) return;

            const best = findBestMarket();
            if (!best) return failSignalLoading('eo', '⏳ No market has enough data yet.');

            const data = tickBuffers[best.market];
            if (!data || data.length < ANALYSIS_WINDOW) {
                return failSignalLoading('eo', `⏳ Need at least ${ANALYSIS_WINDOW} ticks.`);
            }

            signalTimers.eo = setTimeout(() => {
                try {
                    const digits = getSignalWindow(best.market, ANALYSIS_WINDOW);
                    if (!digits.length) throw new Error('No digits');

                    const evenRes = evenOddScore(digits, 'EVEN', ANALYSIS_WINDOW);
                    const oddRes = evenOddScore(digits, 'ODD', ANALYSIS_WINDOW);

                    const candidates = [
                        { side: 'EVEN', score: evenRes.score, features: evenRes.features },
                        { side: 'ODD', score: oddRes.score, features: oddRes.features }
                    ];

                    if (candidates.length > 1) {
                        candidates.sort((a, b) => {
                            const diff = b.score - a.score;
                            if (Math.abs(diff) < 0.02) return Math.random() - 0.5;
                            return diff;
                        });
                    }

                    const bestSide = candidates[0];
                    if (!bestSide) throw new Error('No even/odd candidate');

                    currentSignal.eo = {
                        market: best.market,
                        entropy: best.entropy,
                        bestSide: bestSide.side,
                        bestScore: bestSide.score,
                        bestFeatures: bestSide.features
                    };
                    currentSignal.activeEngine = 'eo';

                    const confidence = Math.max(5, Math.min(99, norm(bestSide.score) * 100));
                    const level = confidence > 70 ? 'HIGH' : confidence > 55 ? 'MEDIUM' : 'LOW';
                    const levelColor = level === 'HIGH' ? '#00FFAA' : level === 'MEDIUM' ? '#FFD700' : '#FF6B00';

                    setEOCard(`
                        <div class="row"><span>${best.market}</span><span>H = ${best.entropy.toFixed(2)}</span></div>
                        <div class="big-digit" style="color:${bestSide.side === 'EVEN' ? '#00BFFF' : '#FF6B00'};">${bestSide.side}</div>
                        <div class="entry-text"><strong>Side: ${bestSide.side}</strong></div>
                        <div class="action-text" style="color:${bestSide.side === 'EVEN' ? '#00BFFF' : '#FF6B00'};">${bestSide.side}</div>
                        <div class="confidence-row">
                            <span class="confidence-label" style="color:${levelColor};">${confidence.toFixed(1)}%</span>
                            <div class="confidence-bar"><div class="confidence-fill" style="width:${confidence}%; background: linear-gradient(90deg, #FF6B00, ${levelColor});"></div></div>
                        </div>
                        <div class="bottom-row">
                            <span>PMR: ${safeNumber(bestSide.score).toFixed(3)}</span>
                            <span>Z: ${((safeNumber(bestSide.score) - 0.5) / 0.05).toFixed(2)}</span>
                        </div>
                        <div class="confidence-level" style="color:${levelColor};">${level} CONFIDENCE</div>
                    `);

                    const eoMarket = document.getElementById('eoMarket');
                    const eoConfidenceValue = document.getElementById('eoConfidenceValue');
                    const eoPMR = document.getElementById('eoPMR');
                    const eoZScore = document.getElementById('eoZScore');
                    const btn = document.getElementById('btnFindEntryEO');

                    if (eoMarket) eoMarket.textContent = best.market;
                    if (eoConfidenceValue) eoConfidenceValue.textContent = `${confidence.toFixed(1)}%`;
                    if (eoPMR) eoPMR.textContent = safeNumber(bestSide.score).toFixed(3);
                    if (eoZScore) eoZScore.textContent = ((safeNumber(bestSide.score) - 0.5) / 0.05).toFixed(2);
                    if (btn) {
                        btn.disabled = false;
                        btn.className = 'btn-entry entry-default';
                        btn.textContent = '🔍 FIND ENTRY';
                    }

                    updateFrequencyChart(best.market);
                    updateMatrixAndSeesaw(best.market);
                } catch (e) {
                    console.error(e);
                    failSignalLoading('eo', '❌ Failed to generate even/odd signal.');
                    return;
                } finally {
                    endSignalLoading('eo');
                }
            }, SIGNAL_DELAY_MS);
        }

        /*****************************************************************
         * 7) ENTRY CONFIRMATION
         *****************************************************************/
        function confirmEntry(digits, selectedDigit, signalScore, liveWindow = LIVE_CONFIRM_WINDOW, threshold = 0.50, engineType = 'match') {
            const live = latestWindow(digits, liveWindow);
            let liveScore = 0;

            if (engineType === 'match') liveScore = matchScore(live, selectedDigit, Math.min(100, live.length)).score;
            else if (engineType === 'differ') liveScore = differScore(live, selectedDigit, Math.min(100, live.length)).score;
            else if (engineType === 'ou') liveScore = signalScore * 0.88;
            else if (engineType === 'eo') liveScore = signalScore * 0.88;
            else liveScore = signalScore * 0.9;

            const drift = Math.abs(signalScore - liveScore);
            const entryScore = 0.42 * norm(signalScore) + 0.38 * norm(liveScore) - 0.22 * drift;
            const status = entryScore >= threshold ? 'CONFIRM' : 'HOLD';

            return { status, entryScore, liveScore, drift };
        }

            console.log("WebSocket processing system initialized securely.");
            // Bootstrap scanning loops safely
            generateMatchesSignal();
            generateOverUnderSignal();
            generateEvenOddSignal();

            initWebSocket();
        }

            unlockApp();
        });
