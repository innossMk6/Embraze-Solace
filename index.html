    // ================================================================

    // ---------------------- CONSTANTS ------------------------------
    const APP_PASSWORD = 'SUCCESSV12';

    // FIX 1: Added Jump Indices to markets
    const MARKETS = [
        '1HZ10V', '1HZ25V', '1HZ50V', '1HZ75V', '1HZ100V',
        'JD10', 'JD25', 'JD50', 'JD75', 'JD100'
    ];

        '1HZ25V': 'V25 (1s)',

    // ---------------------- CORE UTILITIES -------------------------
    function extractLastDigit(price, decimals) {
        if (price === null || price === undefined || isNaN(price)) return null;
        const normalized = Number(price).toFixed(decimals);
        const match = normalized.match(/(\d)(?!.*\d)/);
        return match ? parseInt(match[1], 10) : null;
    }

    function getDecimalsForSymbol(symbol) {
        const s = String(symbol).toUpperCase().replace(/\s+/g, ' ');
        // FIX 2: Added jump indices with 2 decimal places
        const twoDp = [
            '1HZ10V','1HZ25V','1HZ50V','1HZ75V','1HZ100V',
            'JD10','JD25','JD50','JD75','JD100',
            'VOLATILITY 10 (1S)','VOLATILITY 25 (1S)','VOLATILITY 50 (1S)',
            'VOLATILITY 75 (1S)','VOLATILITY 100 (1S)',
            'JUMP 10','JUMP 25','JUMP 50','JUMP 75','JUMP 100'
        ];
        const fourDp = ['VOLATILITY 50','VOLATILITY 75','R_50','R_75'];
        const threeDp = ['VOLATILITY 10','VOLATILITY 25','R_10','R_25'];
        if (twoDp.includes(s)) return 2;
        if (fourDp.includes(s)) return 4;
        if (threeDp.includes(s)) return 3;
        return 3;
    }

    function getTickDigit(symbol, price) {
        const dec = getDecimalsForSymbol(symbol);
        return extractLastDigit(price, dec);
    }

    function latestWindow(arr, size) {
        return arr.slice(-Math.min(size, arr.length));
    }

    function frequency(arr) {
        const counts = {};
        arr.forEach(d => { counts[d] = (counts[d] || 0) + 1; });
        const n = arr.length || 1;
        const result = {};
        for (let i = 0; i < 10; i++) result[i] = (counts[i] || 0) / n;
        return result;
    }

    function entropyFreq(freq) {
        let h = 0;
        for (let i = 0; i < 10; i++) {
            const p = freq[i] || 0;
            if (p > 0) h -= p * Math.log2(p);
        }
        return h;
    }

    function concentrationFreq(freq) {
        let mx = 0;
        for (let i = 0; i < 10; i++) if ((freq[i] || 0) > mx) mx = freq[i] || 0;
        return mx;
    }

    function transitionRate(arr) {
        if (arr.length < 2) return 0;
        let changes = 0;
        for (let i = 1; i < arr.length; i++) if (arr[i] !== arr[i-1]) changes++;
        return changes / (arr.length - 1);
    }

    function sigmoid(x) {
        return 1 / (1 + Math.exp(-x));
    }

    function pickBestCandidate(candidates, key = 'score') {
        if (!candidates || candidates.length === 0) return null;
        let best = candidates[0];
        let bestScore = candidates[0][key] || -Infinity;
        for (let i = 1; i < candidates.length; i++) {
            const score = candidates[i][key] || -Infinity;
            if (score > bestScore) {
                bestScore = score;
                best = candidates[i];
            }
        }
        const close = candidates.filter(c => Math.abs((c[key] || -Infinity) - bestScore) < 0.02);
        if (close.length > 1) {
            best = close[Math.floor(Math.random() * close.length)];
        }
        return best;
    }

    // ---------------------- MARKET PROFILES ------------------------
    // (Keep as before, add profiles for jump indices if needed – they can use defaults)
    function getMarketProfile(symbol) {
        // Use default for jump indices, specific for volatilities
        const profiles = {
            '1HZ10V': { name: 'V10 (1s)', matchBoost: 1.12, differBoost: 1.10, ouBoost: 1.08, eoBoost: 1.06, confidenceScale: 1.03, entryThreshold: 0.49 },
            '1HZ25V': { name: 'V25 (1s)', matchBoost: 1.10, differBoost: 1.08, ouBoost: 1.06, eoBoost: 1.05, confidenceScale: 1.00, entryThreshold: 0.50 },
            '1HZ50V': { name: 'V50 (1s)', matchBoost: 1.08, differBoost: 1.06, ouBoost: 1.05, eoBoost: 1.04, confidenceScale: 0.98, entryThreshold: 0.51 },
            '1HZ75V': { name: 'V75 (1s)', matchBoost: 1.06, differBoost: 1.05, ouBoost: 1.04, eoBoost: 1.03, confidenceScale: 0.96, entryThreshold: 0.52 },
            '1HZ100V': { name: 'V100 (1s)', matchBoost: 1.05, differBoost: 1.04, ouBoost: 1.03, eoBoost: 1.02, confidenceScale: 0.94, entryThreshold: 0.53 }
        };
        if (profiles[symbol]) {
            return { ...profiles[symbol], baseline: { entropy: null, deviation: null, clusterLength: null } };
        }
        // Default for jump indices
        return {
            name: symbol,
            matchBoost: 1.05,
            differBoost: 1.04,
            ouBoost: 1.04,
            eoBoost: 1.03,
            confidenceScale: 0.95,
            entryThreshold: 0.52,
            baseline: { entropy: null, deviation: null, clusterLength: null }
        };
    }

    // ---------------------- ADAPTIVE LEARNING ----------------------
    let adaptiveProfiles = {};

    function updateAdaptiveBaseline(symbol, digits) {
        if (!digits || digits.length < 20) return;
        const freq = frequency(digits);
        const ent = entropyFreq(freq);
        const conc = concentrationFreq(freq);
        let devSum = 0;
        for (let i = 0; i < 10; i++) devSum += Math.abs((freq[i] || 0) - 0.1);
        const dev = devSum / 10;
        let clusterSum = 0, clusterCount = 0, currentRun = 0, lastDigit = null;
        for (const d of digits) {
            if (d === lastDigit) {
                currentRun++;
            } else {
                if (currentRun > 0) { clusterSum += currentRun; clusterCount++; }
                currentRun = 1;
                lastDigit = d;
            }
        }
        if (currentRun > 0) { clusterSum += currentRun; clusterCount++; }
        const avgCluster = clusterCount > 0 ? clusterSum / clusterCount : 1;
        if (!adaptiveProfiles[symbol]) {
            adaptiveProfiles[symbol] = { entropy: ent, deviation: dev, clusterLength: avgCluster, samples: 1 };
        } else {
            const alpha = 0.1;
            const p = adaptiveProfiles[symbol];
            p.entropy = p.entropy + alpha * (ent - p.entropy);
            p.deviation = p.deviation + alpha * (dev - p.deviation);
            p.clusterLength = p.clusterLength + alpha * (avgCluster - p.clusterLength);
            p.samples++;
        }
    }

    function getBaseline(symbol) {
        return adaptiveProfiles[symbol] || { entropy: 3.0, deviation: 0.1, clusterLength: 1.5, samples: 0 };
    }

    // ---------------------- SCORING FUNCTIONS (unchanged) ----------
    // matchScore, differScore, evenOddScore – same as before
    // overUnderScore – we will only use barriers 4 and 5 in the scanner

    function matchScore(digits, digit, windowSize = 100) {
        const window = latestWindow(digits, windowSize);
        if (!window || window.length < 10) return { score: -Infinity, features: { f: 0, persist: 0, ent: 0, conc: 0, trans: 0, freq: {} } };
        const freq = frequency(window);
        const f = freq[digit] || 0;
        const segCount = 5;
        const step = Math.max(1, Math.floor(window.length / segCount));
        let persistHits = 0;
        for (let i = 0; i < segCount; i++) {
            const end = window.length - i * step;
            const start = Math.max(0, end - step);
            const seg = window.slice(start, end);
            if (seg.length === 0) continue;
            const cnt = seg.filter(d => d === digit).length;
            if (cnt / seg.length >= 0.14) persistHits++;
        }
        const persist = persistHits / segCount;
        const ent = entropyFreq(freq);
        const conc = concentrationFreq(freq);
        const trans = transitionRate(window);
        const score = (f * 1.35) + (persist * 1.05) + (conc * 0.50) - (ent * 0.45 + trans * 0.25);
        return { score, features: { f, persist, ent, conc, trans, freq } };
    }

    function differScore(digits, digit, windowSize = 100) {
        const window = latestWindow(digits, windowSize);
        if (!window || window.length < 10) return { score: -Infinity, features: { f: 0, persist: 0, ent: 0, conc: 0, trans: 0, freq: {} } };
        const freq = frequency(window);
        const f = freq[digit] || 0;
        const segCount = 5;
        const step = Math.max(1, Math.floor(window.length / segCount));
        let persistHits = 0;
        for (let i = 0; i < segCount; i++) {
            const end = window.length - i * step;
            const start = Math.max(0, end - step);
            const seg = window.slice(start, end);
            if (seg.length === 0) continue;
            const cnt = seg.filter(d => d === digit).length;
            if (cnt / seg.length <= 0.10) persistHits++;
        }
        const persist = persistHits / segCount;
        const ent = entropyFreq(freq);
        const conc = concentrationFreq(freq);
        const trans = transitionRate(window);
        const score = ((1 - f) * 1.20) + ((1 - conc) * 0.45) + (persist * 0.95) + ((1 - trans) * 0.20) + (ent * 0.15);
        return { score, features: { f, persist, ent, conc, trans, freq } };
    }

    // FIX 3: overUnderScore now only used for barriers 4 and 5, but we keep generic for completeness
    function overUnderScore(digits, mode, barrier, windowSize = 100) {
        const window = latestWindow(digits, windowSize);
        if (!window || window.length < 10) return { score: -Infinity, features: { mass: 0, margin: 0, persist: 0, ent: 0, conc: 0, trans: 0, freq: {} } };
        const freq = frequency(window);
        let mass = 0;
        if (mode === 'OVER') {
            for (let d = barrier + 1; d < 10; d++) mass += freq[d] || 0;
        } else {
            for (let d = 0; d < barrier; d++) mass += freq[d] || 0;
        }
        const margin = Math.max(0, mass - 0.5);
        const segCount = 5;
        const step = Math.max(1, Math.floor(window.length / segCount));
        let persistHits = 0;
        for (let i = 0; i < segCount; i++) {
            const end = window.length - i * step;
            const start = Math.max(0, end - step);
            const seg = window.slice(start, end);
            if (seg.length === 0) continue;
            let cnt = 0;
            if (mode === 'OVER') cnt = seg.filter(d => d > barrier).length;
            else cnt = seg.filter(d => d < barrier).length;
            if (cnt / seg.length >= 0.56) persistHits++;
        }
        const persist = persistHits / segCount;
        const ent = entropyFreq(freq);
        const conc = concentrationFreq(freq);
        const trans = transitionRate(window);
        const score = (mass * 1.35) + (margin * 0.95) + (persist * 1.00) + (conc * 0.32) - (ent * 0.35 + trans * 0.50);
        return { score, features: { mass, margin, persist, ent, conc, trans, freq } };
    }

    function evenOddScore(digits, side, windowSize = 100) {
        const window = latestWindow(digits, windowSize);
        if (!window || window.length < 10) return { score: -Infinity, features: { mass: 0, margin: 0, persist: 0, ent: 0, conc: 0, flipRate: 0, freq: {} } };
        const target = side === 'EVEN' ? [0,2,4,6,8] : [1,3,5,7,9];
        const freq = frequency(window);
        let mass = 0;
        target.forEach(d => { mass += freq[d] || 0; });
        const margin = Math.max(0, mass - 0.5);
        const segCount = 5;
        const step = Math.max(1, Math.floor(window.length / segCount));
        let persistHits = 0;
        for (let i = 0; i < segCount; i++) {
            const end = window.length - i * step;
            const start = Math.max(0, end - step);
            const seg = window.slice(start, end);
            if (seg.length === 0) continue;
            const cnt = seg.filter(d => target.includes(d)).length;
            if (cnt / seg.length >= 0.56) persistHits++;
        }
        const persist = persistHits / segCount;
        const ent = entropyFreq(freq);
        const conc = concentrationFreq(freq);
        let flips = 0;
        for (let i = 1; i < window.length; i++) {
            const prev = target.includes(window[i-1]);
            const cur = target.includes(window[i]);
            if (prev !== cur) flips++;
        }
        const flipRate = window.length > 1 ? flips / (window.length - 1) : 0;
        const score = (mass * 1.35) + (margin * 0.95) + (persist * 1.00) + (conc * 0.28) - (ent * 0.32 + flipRate * 0.48);
        return { score, features: { mass, margin, persist, ent, conc, flipRate, freq } };
    }

    function findRareFollower(digits, windowSize = 100) {
        const window = latestWindow(digits, windowSize);
        if (!window || window.length < 20) return { D: null, R: null, score: 0, freqD: 0, freqR: 0 };
        const freq = frequency(window);
        let D = 0, maxFreq = 0;
        for (let i = 0; i < 10; i++) {
            if ((freq[i] || 0) > maxFreq) { maxFreq = freq[i] || 0; D = i; }
        }
        const transitions = {};
        for (let i = 0; i < 10; i++) transitions[i] = 0;
        let totalD = 0;
        for (let i = 0; i < window.length - 1; i++) {
            if (window[i] === D) {
                totalD++;
                transitions[window[i+1]]++;
            }
        }
        let R = null, minFreq = Infinity;
        for (let i = 0; i < 10; i++) {
            if (i === D) continue;
            if (transitions[i] < minFreq) { minFreq = transitions[i]; R = i; }
        }
        if (R === null) R = (D + 1) % 10;
        const freqR = totalD > 0 ? transitions[R] / totalD : 0;
        return { D, R, score: 1 - freqR, freqD: maxFreq, freqR };
    }

    // ---------------------- ENTRY CONFIRMATION ---------------------
    function confirmEntry(digits, selectedDigit, signalScore, liveWindowSize = 25, threshold = 0.55, strategy = 'match', additionalData = null) {
        const live = latestWindow(digits, liveWindowSize);
        if (!live || live.length < 5) return { status: 'HOLD', entryScore: 0, liveScore: 0, drift: 0 };
        let liveScore = 0;
        switch (strategy) {
            case 'match': liveScore = matchScore(live, selectedDigit, live.length).score; break;
            case 'differ': liveScore = differScore(live, selectedDigit, live.length).score; break;
            case 'ou':
                if (additionalData && additionalData.mode !== undefined) {
                    liveScore = overUnderScore(live, additionalData.mode, additionalData.barrier, live.length).score;
                } else liveScore = signalScore * 0.9;
                break;
            case 'eo':
                if (additionalData && additionalData.side) {
                    liveScore = evenOddScore(live, additionalData.side, live.length).score;
                } else liveScore = signalScore * 0.9;
                break;
            default: liveScore = signalScore * 0.9;
        }
        const drift = Math.abs(signalScore - liveScore);
        const boost = 0.06 * (1 - Math.min(drift / 2, 1));
        const entryScore = 0.50 * sigmoid(signalScore) + 0.40 * sigmoid(liveScore) - 0.14 * Math.min(drift / 2, 1) + boost;
        const status = entryScore >= threshold ? 'CONFIRM' : 'HOLD';
        return { status, entryScore, liveScore, drift };
    }

    // ---------------------- MARKET SCANNER (FIXED) -----------------
    function scanMarkets(tickBuffers, markets, strategy, windowSize = 100, minTicks = 100, filters = {}) {
        const candidates = [];
        for (const market of markets) {
            const data = tickBuffers[market];
            if (!data || data.length < minTicks) continue;
            const digits = data.map(t => t.digit);
            const window = latestWindow(digits, windowSize);
            if (window.length < windowSize) continue;
            let result = null;

            switch (strategy) {
                case 'match': {
                    const scores = [];
                    for (let d = 0; d < 10; d++) {
                        const res = matchScore(window, d, windowSize);
                        scores.push({ digit: d, score: res.score, features: res.features });
                    }
                    const best = pickBestCandidate(scores);
                    if (best) {
                        const profile = getMarketProfile(market);
                        const rawConf = sigmoid(best.score * (profile.matchBoost || 1.05)) * 100;
                        const confidence = Math.max(5, Math.min(99, rawConf * (profile.confidenceScale || 1.0)));
                        result = { market, digit: best.digit, score: best.score, confidence, features: best.features, type: 'match' };
                    }
                    break;
                }
                case 'differ': {
                    const scores = [];
                    for (let d = 0; d < 10; d++) {
                        const res = differScore(window, d, windowSize);
                        scores.push({ digit: d, score: res.score, features: res.features });
                    }
                    const best = pickBestCandidate(scores);
                    const rare = findRareFollower(window, windowSize);
                    if (best) {
                        const profile = getMarketProfile(market);
                        const rawConf = sigmoid(best.score * (profile.differBoost || 1.04)) * 100;
                        const confidence = Math.max(5, Math.min(99, rawConf * (profile.confidenceScale || 1.0)));
                        result = { market, digit: best.digit, score: best.score, confidence, features: best.features, rareFollower: rare, type: 'differ' };
                    }
                    break;
                }
                case 'ou': {
                    // FIX 3: Only consider OVER 4 and UNDER 5
                    const barriers = [
                        { mode: 'OVER', barrier: 4 },
                        { mode: 'UNDER', barrier: 5 }
                    ];
                    const scores = barriers.map(b => {
                        const res = overUnderScore(window, b.mode, b.barrier, windowSize);
                        return { mode: b.mode, barrier: b.barrier, score: res.score, features: res.features };
                    });
                    const best = pickBestCandidate(scores);
                    if (best) {
                        const profile = getMarketProfile(market);
                        const rawConf = sigmoid(best.score * (profile.ouBoost || 1.04)) * 100;
                        const confidence = Math.max(5, Math.min(99, rawConf * (profile.confidenceScale || 1.0)));
                        result = { market, mode: best.mode, barrier: best.barrier, score: best.score, confidence, features: best.features, type: 'ou' };
                    }
                    break;
                }
                case 'eo': {
                    const evenRes = evenOddScore(window, 'EVEN', windowSize);
                    const oddRes = evenOddScore(window, 'ODD', windowSize);
                    const scores = [
                        { side: 'EVEN', score: evenRes.score, features: evenRes.features },
                        { side: 'ODD', score: oddRes.score, features: oddRes.features }
                    ];
                    const best = pickBestCandidate(scores);
                    if (best) {
                        const profile = getMarketProfile(market);
                        const rawConf = sigmoid(best.score * (profile.eoBoost || 1.03)) * 100;
                        const confidence = Math.max(5, Math.min(99, rawConf * (profile.confidenceScale || 1.0)));
                        result = { market, side: best.side, score: best.score, confidence, features: best.features, type: 'eo' };
                    }
                    break;
                }
            }
            if (result) {
                let passes = true;
                if (filters.minConfidence && result.confidence < filters.minConfidence) passes = false;
                if (filters.minScore && result.score < filters.minScore) passes = false;
                if (strategy === 'eo' && filters.minGap) {
                    const even = evenOddScore(window, 'EVEN', windowSize);
                    const odd = evenOddScore(window, 'ODD', windowSize);
                    const gap = Math.abs(even.score - odd.score);
                    if (gap < filters.minGap) passes = false;
                    result.gap = gap;
                }
                if (passes) candidates.push(result);
            }
        }
        return pickBestCandidate(candidates);
    }

    // ---------------------- SIGNAL GENERATORS (with relaxed filters) -
    function generateMatchSignal(tickBuffers, markets, windowSize = 100) {
        // FIX 4: Relaxed filters for MATCH
        const filters = { minConfidence: 40 }; // removed minScore
        const result = scanMarkets(tickBuffers, markets, 'match', windowSize, 100, filters);
        if (!result) return { success: false, message: 'No MATCH signal found' };
        return { success: true, market: result.market, digit: result.digit, score: result.score, confidence: result.confidence, features: result.features, strategy: 'MATCH', recommendation: `MATCH ${result.digit}`, display: { bigDigit: result.digit, actionText: `MATCH ON ${result.digit}`, confidence: result.confidence, market: result.market } };
    }

    function generateDiffersSignal(tickBuffers, markets, windowSize = 100) {
        const filters = { minConfidence: 40 };
        const result = scanMarkets(tickBuffers, markets, 'differ', windowSize, 100, filters);
        if (!result) return { success: false, message: 'No DIFFERS signal found' };
        return { success: true, market: result.market, digit: result.digit, score: result.score, confidence: result.confidence, features: result.features, rareFollower: result.rareFollower, strategy: 'DIFFERS', recommendation: `DIFFERS ${result.digit}`, display: { bigDigit: result.digit, actionText: `DIFFER ON ${result.digit}`, confidence: result.confidence, market: result.market } };
    }

    function generateOvernUnderSignal(tickBuffers, markets, windowSize = 100) {
        const filters = { minConfidence: 40, minScore: 0.4 };
        const result = scanMarkets(tickBuffers, markets, 'ou', windowSize, 100, filters);
        if (!result) return { success: false, message: 'No OVER/UNDER signal found' };
        return { success: true, market: result.market, mode: result.mode, barrier: result.barrier, score: result.score, confidence: result.confidence, features: result.features, strategy: 'OVER/UNDER', recommendation: `${result.mode} ${result.barrier}`, display: { bigDigit: result.barrier, actionText: `${result.mode} ${result.barrier}`, confidence: result.confidence, market: result.market, mass: result.features.mass || 0 } };
    }

    function generateEvenOddSignal(tickBuffers, markets, windowSize = 100) {
        const filters = { minConfidence: 40, minScore: 0.4, minGap: 0.1 };
        const result = scanMarkets(tickBuffers, markets, 'eo', windowSize, 100, filters);
        if (!result) return { success: false, message: 'No EVEN/ODD signal found' };
        return { success: true, market: result.market, side: result.side, score: result.score, confidence: result.confidence, features: result.features, gap: result.gap || 0, strategy: 'EVEN/ODD', recommendation: result.side, display: { bigDigit: result.side, actionText: result.side, confidence: result.confidence, market: result.market, pmr: result.score, gap: result.gap || 0 } };
